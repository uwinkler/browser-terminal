<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Terminal</title>
    
    <!-- xterm.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="session-switcher">
            <select id="session-select" title="tmux-Session wechseln">
                <option value="">— Session wählen —</option>
            </select>
            <button id="session-refresh" title="Sessions neu laden">⟳</button>
        </div>
        <div class="terminal-container">
            <div id="terminal"></div>
        </div>
        
        <footer class="footer">
            <div class="status">
                <span id="status-indicator" class="status-dot disconnected"></span>
                <span id="status-text">Verbindung wird hergestellt...</span>
            </div>
        </footer>
    </div>

    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- xterm.js -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="client.js"></script>
</body>
</html>
